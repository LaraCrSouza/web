<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #galinha{
            font-size: 100px;
            animation: voar 1s linear 0s infinite;
        }

        #rocket{
            display: inline-block;
            position: fixed;
            bottom: 0px;
            left: 0px;
            font-size: 50pt;
            transform: rotate(-45deg);
            animation: lancamento 10s ease-in infinite;
        }
        img{
            width: 20vw;
            animation: voar 1s linear infinite;
        }

        @keyframes lancamento {
            0%{}

            50%{left: 50vw; transform: rotate(-60deg);}

            100%{transform: rotate(-45deg);
            bottom: 100vh;}
           /*from{

            }
            to{
                bottom: 100vh;
                left: 0px;
            }*/
            
        }
        @keyframes voar {

            0%{font-size: 1px;
            transform: rotate(0deg);}

            100%{font-size: 100px;
            transform: rotate(360deg);}
        }
    </style>
</head>
<body>
    <span id="galinha">🐔</span>
    <img id="Naruto" src="./img/Naruto.jpg" alt="Imagem Naruto">
    <span id="rocket">🚀</span>
</body>
</html>
