<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        .container{
            display: flex;
            align-items: center;
            background-color: rgb(141, 136, 136);
            height: 600px;
            align-content: flex-start;
            flex-direction: column; 
            

        }
        .layout{
            display: flex;
            align-content: center;
            gap: 16px;
            background-color: white;
            width: 500px;
            height: 560px;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            
            
        }
        .circulo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        #circulo-1{
            background-image: url(imgs/LindaHart.jpg);
        }
        #circulo-2{
            background-image: url(imgs/Roger\ Medina.jpg);
        }
        #circulo-3{
            background-image: url(imgs/Dean\ Sullivan.jpg);
        }
        #circulo-4{
            background-image: url(imgs/Elizabeth.jpg);
        }
        .item{
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 15px;
            gap: 15px;
        }
        

    </style>
</head>
<body>
    
    <div class="container">
       
        <div class="layout">

            <div class="item">
                <div class="circulo" id="circulo-1"></div>
                <div class="conteudo">
                    <h3>Linda Hart</h3>
                    <p>6765 Shady Ln Dr</p>
                </div>
            </div>

            <div class="item">
                <div class="circulo" id="circulo-2"></div>
                <div class="conteudo">
                    <h3>Roger Medina</h3>
                    <p>2420 Paddock Way</p>
                </div>
            </div>

            <div class="item">
                <div class="circulo" id="circulo-3"></div>
                <div class="conteudo">
                    <h3>Dean Sullivan</h3>
                    <p>6727 Airplane Ave</p>
                </div>
            </div>

            <div class="item">
                <div class="circulo" id="circulo-4"></div>
                <div class="conteudo">
                    <h3>Elizabeth Austin</h3>
                    <p>6685 Blossom Hill Rd</p>
                </div>
            </div>

        </div>
       
        
    </div>
</body>
</html>
