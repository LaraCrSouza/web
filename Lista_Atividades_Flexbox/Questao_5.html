<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            margin: 0;
        }
        
       .container{
        display: flex;
        height: 100vh;
        flex-direction: column;
       }
       .header, .footer{
        width: 100%;
       }
       .meio{
            display: flex;
            flex: 1;
        }
        #box1, #box2, #box3, #box4, #box5 {
            padding: 10px;
        }
        #box1, #box5{
            background-color: green;
            height: 80px;
            flex-direction: row;
        }
        #box2{
            background-color: white;
            flex-grow: 3;
        }
        #box3{
            background-color: bisque;
            flex-grow: 2;
            
        }
        #box4{
            background-color: aquamarine;
            flex-grow: 2;
        }
        
    </style>
</head>
<body>

    
    <div class="container">
        <div class="header">
            <div class="box" id="box1">Header</div>
        </div>

        <div class="meio">
            <div class="box" id="box2">Article</div>
            <div class="box" id="box3">Aside</div>
            <div class="box" id="box4">Nav</div>
        </div>

        <div class="footer">
            <div class="box" id="box5">Footer</div>
        </div>
    </div>
</body>
</html>
