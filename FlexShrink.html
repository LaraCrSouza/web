<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{
            display:flex;
        }
        .box{
            flex-grow: 1;
            border: 1px solid black;
            width: 300px;
        }
        #box-1{
            background-color: aqua;
        }
        #box-2{
            background-color: rgb(140, 0, 255);
            flex-shrink: 3;
        }
        #box-3{
            background-color: rgb(194, 30, 145);
        }
        #box-4{
            background-color: rgb(136, 17, 17);
        }
        #box-5{
            background-color: rgb(61, 158, 74);
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box-1">1</div>
        <div class="box" id="box-2">2</div>
        <div class="box" id="box-3">3</div>
        <div class="box" id="box-4">4</div>
        <div class="box" id="box-5">5</div>
    </div>
</body>
</html>
