<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{border: 1px solid rgb(2, 3, 71); 
        margin:0px; 
        padding: 0px;}

        .container{
            position: static;
            border-color: brown;
            border-width: 10px;
        }
        .box{
            display: inline-block;
            width: 100px;
            height: 100px;
            border-color: rgb(0, 0, 0);
        }
        
        #box1{background-color: rgb(3, 63, 119);
        position: relative;
        left: 50px;
        top: 300px;}

        #box2{background-color: rgb(5, 85, 160);
        position: absolute;
        opacity: 0.5;
        text-align: center;
        top: 300px}

        #box3{background-color: rgb(8, 101, 189);
        position: fixed; /**relaciona em relação a tela-->**/
        top: 0px;
        right:0px;}   

        #box4{background-color: rgb(9, 126, 236);
        }

        #box5{background-color: rgb(8, 136, 255);}
        span:last-child{background-color: pink ;}

    </style>
</head>

<body>
    <div style="height: 100px;"></div>
    <div id="container">
        <div id="box1" class="box">1</div>
        <div id="box2" class="box">2</div>
        <div id="box3" class="box">3</div>
        <div id="box4" class="box">4</div>
        <div id="box5" class="box">5</div>
        <span class="box">6</span>
    </div>

    <!--1-Fluxo textual do HTML
    display: inlinem block, inline-block-->

    <!--2-Positions: STatic
    top, botton feft, right-->

    <!--Position static posiciona o elemento com base na posição estatica dele-->

</body>
</html>
