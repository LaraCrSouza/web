<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{border: 1px solid rgb(2, 3, 71); 
        margin:0px; 
        padding: 0px;}

        .box{
            display: inline-block;
            width: 100px;
            height: 100px;
            border-color: rgb(0, 0, 0);
        }
        
        #box1{background-color: rgb(3, 63, 119);
        position: relative;
        top: 100px;
        left: 150px;}

        #box2{background-color: rgb(5, 85, 160);
        position: static;
        top: 200px;}

        #box3{background-color: rgb(8, 101, 189);}
        #box4{background-color: rgb(9, 126, 236);
        position: fixed;
        bottom: 0px;
        right: 0px;
        }
        #box5{background-color: rgb(8, 136, 255);}
        span:last-child{background-color: pink ;}

        #container{position: relative;}
    </style>
</head>

<body>
    <div style="height: 100px;"></div>
    <div id="container">
        <div id="box1" class="box">1</div>
        <div id="box2" class="box">2</div>
        <div id="box3" class="box">3</div>
        <div id="box4" class="box">4</div>
        <div id="box5" class="box">5</div>
        <span class="box">6</span>
    </div>
</body>
</html>
