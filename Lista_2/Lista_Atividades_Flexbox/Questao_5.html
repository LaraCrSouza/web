<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
       
        #box-1{
            background-color: green;
        }
        #box-2{
            background-color: white;
        }
        #box-3{
            background-color: bisque;
        }
        #box-4{
            background-color: aquamarine;
        }
        #box-5{
            background-color: green;
            align-items: flex-end;
        }
        .linha{
            display: flex;
            flex-direction: row;
        }
            
        .coluna{
            display: flex;
            flex-direction: column;
            
        }
    </style>
</head>
<body>

    <div id="layout"></div>
        <div class="coluna">
                    <div class="box" id="box-1">Header</div>
                    
        </div>
        <div class="linha">
            <div class="box" id="box-2">Article</div>
            <div class="box" id="box-3">Aside</div>
            <div class="box" id="box-4">Nav</div>
        </div>
        <div class="box" id="box-5">Footer</div>
</body>
</html>
