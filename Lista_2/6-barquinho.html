<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    body{
        background-image: url(img/25672931-claro-azul-ceu-ilustracao-azul-ceu-nao-nuvem-fundo-projeto-para-fundo-poster-crianca-arte-desenho-animado-vetor.jpg);
    }
    .mar{
         background: radial-gradient(circle, #5278bd, #1a388a);
        width: 2000px;
        height: 300px;
        position: absolute;
        top: 70%;
    }
    .barco{
        font-size: 200px;
        position: absolute;
        z-index: auto;
        animation: movimento 10s linear infinite alternate;
        top: 60%; 
        left: 0;
    }
    
    .nuvem{
        background: white;
        width: 200px;
        height: 60px;
        border-radius: 50px 60px 80px 25px;
        box-shadow: 5px 5px 10px #888;
        position: relative;
        bottom: 70%;
        animation: nuvem 50s linear infinite alternate;
    }
    #nuvem::after, #nuvem::before {
    content: '';
    background: rgb(255, 255, 255);
    border-radius: 50%; 
    }

    #nuvem::before {
    content: '';
    width: 70px;
    height: 70px;
    top: -30px;
    left: 30px;
    }

    #nuvem::after {
    width: 100px;
    height: 100px;
    top: -50px;
    right: 30px;
    }
   @keyframes movimento {
    from{
        left: 100%;
    }
    to{
        right: 100%;;
    }
    
   }
     @keyframes nuvem {

        from{
            right: -100%;
        }
        to{
            right: 100%;
        }

            
    }
    @keyframes navegar {

        0%{font-size: 1px;
        transform: rotate(0deg);}

        100%{font-size: 100px;
        transform: rotate(360deg);}
    }
    </style>

    
</head>
<body>
    <div class="barco">⛵</div>
    <div class="nuvem"></div>
    <div class="mar"></div>
</body>
</html>
