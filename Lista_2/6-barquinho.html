<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    
body{
    margin: 0;
    overflow: hidden;
}
    .ceu{
        width: 2000px;
        height: 600px;
        background: linear-gradient(white, blue);
        position: relative;
        overflow: hidden; 
         
    }
    
    .mar{
         background: radial-gradient(circle, #5278bd, #1a388a);
        width: 2000px;
        height: 300px;
        position: absolute;
        top: 70%;
    }
    .barco{
        font-size: 200px;
        position: absolute;
        z-index: auto;
        animation: movimento 10s linear infinite alternate;
        top: 60%; 
        left: -300px;
        
       
    }
    
    .nuvem{
        background: white;
        width: 200px;
        height: 60px;
        border-radius:50px;
        box-shadow: 5px 5px 10px #888;
        position: absolute;
        animation: nuvem 15s linear infinite alternate;
        top: 40%;
        transform: translateY(-40%);
    }
    .nuvem::before,
    .nuvem::after {
    content: "";
    position: absolute;
    background: #fff;
    border-radius: 50%;
    right: -50px;
}


    .nuvem::before {
    width: 90px;
    height: 90px;
    top: -40px;
    left: 20px;
    }

    .nuvem::after {
        width: 70px;
        height: 70px;
        top: -30px;
        right: 20px;
    }
   @keyframes movimento {

    from { left: -10%; }
    to { left: 100%; }
    
   }
     @keyframes nuvem {

        from {
        left: -300px;
        }
        to {
            left: 2000px;
        }
    }
    @keyframes navegar {

        0%{font-size: 1px;
        transform: rotate(0deg);}

        100%{font-size: 100px;
        transform: rotate(360deg);}
    }
    </style>

    
</head>
<body>
    
   
    <div class="ceu">
         <div class="nuvem"></div>
    </div>
    <div class="mar"></div>
    <div class="barco">⛵</div>
</body>
</html>
