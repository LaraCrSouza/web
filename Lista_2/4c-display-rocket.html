<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        /**reset css **/
        *{margin: 0px; padding: 0px;
            animation: rotacao 5s linear 0s infinite;}
        

        body{
            min-height: 100vh;
         }
        .box{
            border: 1px solid black;
            box-sizing: border-box;
            height: 20vh;
            width: 10vw;
            display:inline-block;
            text-align: center;
            line-height: 20vh;
        }

        #box1{
            background-color: blue;
            position: fixed;
            left: 0px;
            bottom: 0px;
        }

        #box2{
            background-color: green;
            position: fixed;
            right: 0px;
            bottom: 0px;
        }

        #box3{
            background-color: red;
            position: fixed;
            left: 0%;
            top: 0%;
        }
        #box4{
            background-color: yellow;
            position: fixed;
            right: 0px;
            
        }
        #box5{
            background-color: magenta;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
        }
        @keyframes rotacao {
            0%{}

            100%{transform: rotate(360deg);}
        }


    </style>
</head>
<body><div id="box1" class="box">1</div><div id="box2" class="box">2</div><div id="box3" class="box">3</div><div id="box4" class="box">4</div></body><div id="box5" class="box">5</div>
</html>
